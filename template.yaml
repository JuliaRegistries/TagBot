AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: TagBot Web Service

Parameters:
  GithubToken:
    Type: String
    NoEcho: true
    Default: ''
  TagbotRepo:
    Type: String
    Default: JuliaRegistries/TagBot
  TagbotIssuesRepo:
    Type: String
    Default: JuliaRegistries/TagBotErrorReports
  TagbotCommit:
    Type: String
    Default: unknown

Globals:
  Function:
    Runtime: python3.12
    Environment:
      Variables:
        GITHUB_TOKEN: !Ref GithubToken
        TAGBOT_REPO: !Ref TagbotRepo
        TAGBOT_ISSUES_REPO: !Ref TagbotIssuesRepo
        TAGBOT_COMMIT: !Ref TagbotCommit

Resources:
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: tagbot.web.lambda_handler.handler
      CodeUri: .
      Timeout: 10
      Events:
        Root:
          Type: Api
          Properties:
            Path: /
            Method: ANY
        Proxy:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
      Environment:
        Variables:
          REPORTS_FUNCTION: !Ref ReportsFunction
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref ReportsFunction

  ReportsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: tagbot.web.reports.handler
      CodeUri: .
      Timeout: 30

Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/
