AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: TagBot Web Service

Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
  GithubToken:
    Type: String
    NoEcho: true
    Default: ''
  TagbotRepo:
    Type: String
    Default: JuliaRegistries/TagBot
  TagbotIssuesRepo:
    Type: String
    Default: JuliaRegistries/TagBotErrorReports

Conditions:
  IsProd: !Equals [!Ref Stage, prod]

Globals:
  Function:
    Runtime: python3.11
    Environment:
      Variables:
        GITHUB_TOKEN: !Ref GithubToken
        TAGBOT_REPO: !Ref TagbotRepo
        TAGBOT_ISSUES_REPO: !Ref TagbotIssuesRepo

Resources:
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub TagBotWeb-${Stage}-api
      Handler: tagbot.web.lambda_handler.handler
      CodeUri: .
      Timeout: 10
      Events:
        Root:
          Type: Api
          Properties:
            Path: /
            Method: ANY
        Proxy:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
      Environment:
        Variables:
          REPORTS_FUNCTION: !Ref ReportsFunction
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref ReportsFunction

  ReportsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub TagBotWeb-${Stage}-reports
      Handler: tagbot.web.reports.handler
      CodeUri: .
      Timeout: 30

  CustomDomain:
    Type: AWS::ApiGateway::DomainName
    Condition: IsProd
    Properties:
      DomainName: julia-tagbot.com
      RegionalCertificateArn: !Sub arn:aws:acm:${AWS::Region}:${AWS::AccountId}:certificate/{{resolve:ssm:/tagbot/cert-arn}}
      EndpointConfiguration:
        Types: [REGIONAL]

  CustomDomainMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Condition: IsProd
    Properties:
      DomainName: !Ref CustomDomain
      RestApiId: !Ref ServerlessRestApi
      Stage: !Ref ServerlessRestApi.Stage

Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/
  CustomDomainUrl:
    Condition: IsProd
    Description: Custom domain URL
    Value: https://julia-tagbot.com/
